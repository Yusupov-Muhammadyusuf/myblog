{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/edit.css' %}">
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-12">
            
            <form action="{% url 'edit_post' post.pk %}" method="POST">
                {% csrf_token %}
                
                <div class="d-flex align-items-center mb-3 meta-text text-uppercase">
                    <span class="fw-medium">{{ post.category }}</span>
                    <span class="mx-2">•</span>
                    <span>{{ post.created_at|date:"F j, Y" }}</span>
                </div>

                <div class="mb-4">
                    <input type="text" 
                           name="title"
                           class="form-control edit-title-input" 
                           value="{{ form.title.value|default:post.title }}" 
                           placeholder="Article title..."
                           required>
                </div>

                <div class="mb-5">
                    <label class="form-label text-muted small text-uppercase fw-medium mb-2">Article Content</label>
                    <textarea name="content" 
                              class="form-control edit-content-input" 
                              rows="6" 
                              placeholder="Enter article content here..."
                              required>{{ form.content.value|default:post.content }}</textarea>
                </div>

                <input type="hidden" name="category" value="{{ post.category }}">

                <div class="d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-4">
                        <button type="submit" class="btn btn-save">
                            Save Changes
                        </button>
                        <a href="{{ next_url|default:'/' }}" class="btn btn-cancel text-decoration-none">
                            Cancel
                        </a>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
