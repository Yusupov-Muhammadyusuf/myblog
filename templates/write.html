{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Post</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/write.css' %}">

    {{ form.media }}
</head>
<body>

    <nav class="custom-nav sticky-top py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a class="brand-name" href="{% url 'blog_list' %}">Muhammadyusuf's Blog</a>
                <span class="text-muted small">New Story</span>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            {{ form.category }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Title</label>
                        {{ form.title }}
                    </div>

                    <div class="mb-5">
                        <label class="form-label">Content</label>
                        {{ form.content }}
                    </div>

                    <div class="d-flex align-items-center gap-4">
                        <button type="submit" class="btn btn-publish">Publish</button>
                        <a href="{% url 'blog_list' %}" class="btn-cancel">Cancel</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
